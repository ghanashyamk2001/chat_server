<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Messages</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #messages {
            list-style-type: none;
            padding: 0;
        }
        #messages li {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Messages from API Endpoint</h1>
    <ul id="messages"></ul>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('http://localhost:5000/api/messages/667eb07fe8afac9006ea0659');
                if (!response.ok) {
                    throw new Error('Failed to fetch messages');
                }
                const data = await response.json();
                const messagesContainer = document.getElementById('messages');
                data.forEach(message => {
                    const li = document.createElement('li');
                    li.textContent = `Text: ${message.text}, Created At: ${message.createdAt}`;
                    messagesContainer.appendChild(li);
                });
            } catch (error) {
                console.error('Error fetching data:', error);
                const errorMessage = document.createElement('p');
                errorMessage.textContent = 'Failed to fetch data';
                document.body.appendChild(errorMessage);
            }
        });
    </script>
</body>
</html>
